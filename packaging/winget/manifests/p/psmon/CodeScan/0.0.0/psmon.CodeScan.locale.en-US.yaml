License: MIT
LicenseUrl: https://github.com/psmon/CodeScan/blob/main/LICENSE
ShortDescription: CLI/TUI/GUI source-code scanner with FTS5 search and git blame.
Description: |
  CodeScan is a .NET 10 single-binary scanner that indexes source files at the
  class:method level, integrates git blame, stores results in SQLite with FTS5
  full-text search, and ships a CLI, TUI, and HTTP+browser GUI in one binary.
  User data lives under ~/.codescan/ and is preserved across upgrades.
Moniker: codescan
